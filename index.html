<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="StadiumIQ — AI-powered proactive concierge for MetroArena. Real-time crowd routing, queue times, and gate guidance.">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: data: blob:; script-src 'self' 'unsafe-inline' https://maps.googleapis.com https://maps.gstatic.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://maps.googleapis.com https://maps.gstatic.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob: https://*.googleapis.com https://*.gstatic.com; connect-src 'self' https://*.googleapis.com https://*.google.com https://*.firebaseio.com https://firebasestorage.googleapis.com wss://*.firebaseio.com; frame-src https://*.google.com; worker-src blob:;">
  <!-- Resource hints for faster connection to Google APIs -->
  <link rel="preconnect" href="https://maps.googleapis.com">
  <link rel="preconnect" href="https://maps.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://generativelanguage.googleapis.com">
  <title>StadiumIQ — MetroArena Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="config.js"></script>
</head>
<body>

<div id="alert-banner" role="alert" aria-live="assertive" hidden>
  <span id="alert-icon" aria-hidden="true">></span>
  <span id="alert-text"></span>
  <button id="alert-close" onclick="dismissAlert()"
    aria-label="Dismiss alert">x</button>
</div>

<main class="shell" role="main">

  <section class="map-panel" aria-label="Venue map">
    <div id="map" aria-label="MetroArena interactive map"></div>
    <div id="crowd-legend" aria-label="Gate capacity legend">
      <span class="dot green"></span> Low
      <span class="dot amber"></span> Medium
      <span class="dot red"></span> High
    </div>
  </section>

  <section class="chat-panel" aria-label="Chat with StadiumIQ">
    <header class="chat-header">
      <div class="chat-logo" aria-hidden="true">SQ</div>
      <div>
        <h1>StadiumIQ</h1>
        <p id="game-status" aria-live="polite">Connecting...</p>
      </div>
    </header>

    <div id="messages" role="log"
      aria-live="polite" aria-label="Conversation history"></div>

    <div class="chips" role="group" aria-label="Quick questions">
      <button class="chip" onclick="quickAsk('Nearest food stall?')">Food nearby</button>
      <button class="chip" onclick="quickAsk('Current queue times?')">Queue times</button>
      <button class="chip" onclick="quickAsk('Best gate to enter?')">Gate advice</button>
      <button class="chip" onclick="quickAsk('Nearest restroom?')">Restrooms</button>
      <button class="chip" onclick="quickAsk('Best way to exit now?')">Exit route</button>
    </div>

    <form id="chat-form" onsubmit="handleSubmit(event)">
      <input type="text" id="user-input"
        placeholder="Ask anything about the venue..."
        aria-label="Message StadiumIQ"
        autocomplete="off" maxlength="300">
      <button type="submit" aria-label="Send message">Send</button>
    </form>
  </section>

</main>

<script type="module" src="js/app.js"></script>
<script>
  window.onMapsLoaded = async function() {
    // Wait for stadium.json to be fetched before placing markers
    let waited = 0;
    while (!window.STADIUM && waited < 5000) {
      await new Promise(r => setTimeout(r, 50));
      waited += 50;
    }
    const { initMap } = await import("./js/maps.js");
    initMap();
  };
</script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAY4k4eFkpE_QupSCUnTnJIkP5C2Ly77HY&libraries=places,marker&callback=onMapsLoaded&loading=async" async defer></script>
</body></html>
